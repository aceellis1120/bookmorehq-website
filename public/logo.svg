<svg xmlns="http://www.w3.org/2000/svg" width="220" height="44" viewBox="0 0 220 44">
  <!-- Calendar icon -->
  <rect x="2" y="6" width="32" height="32" rx="6" fill="none" stroke="#3B82F6" stroke-width="2.5"/>
  <!-- Calendar top tabs -->
  <line x1="12" y1="2" x2="12" y2="10" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="24" y1="2" x2="24" y2="10" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Calendar divider line -->
  <line x1="2" y1="16" x2="34" y2="16" stroke="#3B82F6" stroke-width="2"/>
  <!-- Checkmark -->
  <polyline points="11,27 15,31 25,21" fill="none" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- BookMore text -->
  <text x="44" y="30" fill="#FFFFFF" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" letter-spacing="-0.5">BookMore</text>
  <!-- HQ text in blue -->
  <text x="164" y="30" fill="#3B82F6" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" letter-spacing="-0.5">HQ</text>
</svg>
